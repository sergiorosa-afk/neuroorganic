{% extends 'base.html' %}
{% block title %}Novo Cliente — Admin{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto">
    <div class="mb-6">
        <h1 class="text-xl font-bold text-gray-900">Novo Cliente</h1>
        <p class="text-sm text-gray-500">Cria o cliente e o usuário de acesso ao mesmo tempo</p>
    </div>

    <div class="bg-white rounded-xl border border-gray-100 p-6">
        <form method="POST" class="space-y-4">

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Nome do cliente *</label>
                <input type="text" name="nome" required
                    class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-gray-300"
                    placeholder="Ex: Neuroseller">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Instagram handle *</label>
                <div class="flex">
                    <span class="px-3 py-2 bg-gray-100 border border-r-0 border-gray-200 rounded-l-lg text-sm text-gray-500">@</span>
                    <input type="text" name="instagram_handle" required
                        class="flex-1 border border-gray-200 rounded-r-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-gray-300"
                        placeholder="neuroseller1">
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Webhook Make.com</label>
                <input type="url" name="make_webhook_url"
                    class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-gray-300"
                    placeholder="https://hook.make.com/...">
                <p class="text-xs text-gray-400 mt-1">Pode deixar em branco e configurar depois</p>
            </div>

            <hr class="border-gray-100">
            <p class="text-xs font-semibold text-gray-500 uppercase tracking-wide">Acesso do cliente</p>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Email de login *</label>
                <input type="email" name="email" required
                    class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-gray-300"
                    placeholder="cliente@email.com">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Senha inicial *</label>
                <input type="text" name="senha" required
                    class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-gray-300"
                    placeholder="Mínimo 8 caracteres">
            </div>

            <div class="flex gap-3 pt-2">
                <button type="submit"
                    class="flex-1 bg-gray-900 text-white rounded-lg py-2 text-sm font-medium hover:bg-gray-700 transition">
                    Criar Cliente
                </button>
                <a href="{{ url_for('admin_clientes') }}"
                    class="px-4 py-2 border border-gray-200 rounded-lg text-sm text-gray-600 hover:bg-gray-50 transition">
                    Cancelar
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
