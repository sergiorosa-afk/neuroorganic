{% extends 'base.html' %}
{% block title %}Login — NeuroOrganic{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center -mt-8">
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 w-full max-w-sm p-8">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-gray-900">NeuroOrganic</h1>
            <p class="text-sm text-gray-500 mt-1">Plataforma de marketing orgânico</p>
        </div>

        <form method="POST" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                <input type="email" name="email" required
                    class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-gray-300"
                    placeholder="seu@email.com">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Senha</label>
                <input type="password" name="senha" required
                    class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-gray-300"
                    placeholder="••••••••">
            </div>
            <button type="submit"
                class="w-full bg-gray-900 text-white rounded-lg py-2 text-sm font-medium hover:bg-gray-700 transition">
                Entrar
            </button>
        </form>
    </div>
</div>
{% endblock %}
